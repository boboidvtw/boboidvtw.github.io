<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>∑ Calc - 超強萬能計算機</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --bg-dark: #0f172a;
            --bg-dark-secondary: #1e293b;
            --bg-dark-tertiary: #334155;
            --text-dark: #ffffff;
            --text-dark-secondary: #cbd5e1;
            --border-dark: #475569;
            --red: #dc2626;
            --red-light: #991b1b;
            --green: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-dark-secondary) 100%);
            color: var(--text-dark);
            transition: background 0.3s;
            min-height: 100vh;
            padding: 20px;
        }

        body.light {
            --bg-dark: #f8fafc;
            --bg-dark-secondary: #ffffff;
            --bg-dark-tertiary: #f1f5f9;
            --text-dark: #0f172a;
            --text-dark-secondary: #475569;
            --border-dark: #cbd5e1;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .lang-selector {
            background: var(--bg-dark-tertiary);
            border: 1px solid var(--border-dark);
            color: var(--text-dark);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .lang-selector:hover {
            background: var(--primary);
        }

        .theme-btn {
            background: var(--bg-dark-tertiary);
            border: none;
            color: var(--text-dark);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            background: var(--primary);
        }

        .panel {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-dark);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        body.light .panel {
            background: rgba(255, 255, 255, 0.8);
        }

        .display {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        body.light .display {
            background: rgba(241, 245, 249, 0.6);
        }

        .display-text {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Courier New', monospace;
            word-break: break-all;
            max-width: 100%;
        }

        .display-formula {
            font-size: 12px;
            color: var(--text-dark-secondary);
            margin-top: 8px;
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 12px;
            overflow-x: auto;
        }

        .tab {
            background: none;
            border: none;
            color: var(--text-dark-secondary);
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            font-size: 14px;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--primary);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-function {
            background: rgba(6, 182, 212, 0.2);
            color: var(--primary);
        }

        .btn-operator {
            background: rgba(16, 185, 129, 0.2);
            color: var(--green);
        }

        .btn-delete {
            background: rgba(220, 38, 38, 0.2);
            color: var(--red);
        }

        .btn-equals {
            background: rgba(6, 182, 212, 0.3);
            color: var(--primary);
        }

        .btn-zero {
            grid-column: span 2;
        }

        .conversion-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .conversion-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .conversion-item {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .conversion-label {
            font-size: 12px;
            color: var(--text-dark-secondary);
            margin-bottom: 4px;
        }

        .conversion-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }

        .hidden {
            display: none;
        }

        .refresh-btn {
            padding: 8px 12px;
            background: var(--bg-dark-tertiary);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--primary);
        }

        .update-time {
            font-size: 11px;
            color: var(--text-dark-secondary);
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dark-secondary);
        }

        h3, h4 {
            color: var(--text-dark);
        }

        /* 公式庫樣式 */
        .formula-search {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .formula-search input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
            font-size: 14px;
        }

        .formula-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .formula-item {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .formula-item:hover {
            background: rgba(6, 182, 212, 0.2);
            transform: translateX(4px);
        }

        .formula-name {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .formula-expr {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dark-secondary);
        }

        .formula-category {
            display: inline-block;
            font-size: 10px;
            background: rgba(6, 182, 212, 0.2);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-dark);
            color: var(--primary);
        }

        .add-formula-form {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: var(--text-dark-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
            font-size: 12px;
        }

        .form-buttons {
            display: flex;
            gap: 8px;
        }

        .form-buttons button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-submit {
            background: var(--green);
            color: var(--bg-dark);
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
        }

        .btn-cancel:hover {
            background: var(--red);
        }

        .delete-formula-btn {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            padding: 4px;
        }

        .delete-formula-btn:hover {
            transform: scale(1.2);
        }

        .formula-item-custom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .formula-item-content {
            flex: 1;
        }

        /* Modal 樣式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-dark-secondary);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .modal-formula {
            font-size: 12px;
            color: var(--text-dark-secondary);
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
        }

        .modal-variables {
            margin-bottom: 16px;
        }

        .variable-input {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .variable-input label {
            min-width: 40px;
            font-weight: 600;
            color: var(--primary);
        }

        .variable-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-calculate {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .btn-calculate:hover {
            opacity: 0.9;
        }

        .btn-close-modal {
            background: var(--bg-dark-tertiary);
            color: var(--text-dark);
        }

        .btn-close-modal:hover {
            background: var(--red);
        }

        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .saved-item {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-formula {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dark-secondary);
        }

        .saved-result {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">∑ Calc</div>
            <div class="controls">
                <select class="lang-selector" id="langSelector">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="ja">日本語</option>
                </select>
                <button class="theme-btn" id="themeBtn">☀️</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <!-- 主計算機 -->
            <div class="panel">
                <div class="display">
                    <div class="display-text" id="display">0</div>
                    <div class="display-formula" id="displayFormula"></div>
                </div>

                <div class="tabs">
                    <button class="tab active" data-tab="calc" data-i18n="tab_calc">計算</button>
                    <button class="tab" data-tab="unit" data-i18n="tab_unit">單位</button>
                    <button class="tab" data-tab="currency" data-i18n="tab_currency">匯率</button>
                    <button class="tab" data-tab="formula" data-i18n="tab_formula">公式</button>
                    <button class="tab" data-tab="saved"><span data-i18n="tab_saved">儲存</span> (<span id="savedCount">0</span>)</button>
                </div>

                <!-- 計算區 -->
                <div id="calcPanel" class="tab-content">
                    <div class="button-grid">
                        <button class="btn btn-function">sin(</button>
                        <button class="btn btn-function">cos(</button>
                        <button class="btn btn-function">tan(</button>
                        <button class="btn btn-delete" data-i18n="btn_clear">C</button>

                        <button class="btn btn-function">log(</button>
                        <button class="btn btn-function">ln(</button>
                        <button class="btn btn-function">√(</button>
                        <button class="btn btn-delete" data-i18n="btn_backspace">←</button>

                        <button class="btn btn-operator">|</button>
                        <button class="btn btn-operator">^</button>
                        <button class="btn btn-operator">%</button>
                        <button class="btn btn-operator">÷</button>

                        <button class="btn">7</button>
                        <button class="btn">8</button>
                        <button class="btn">9</button>
                        <button class="btn btn-operator">×</button>

                        <button class="btn">4</button>
                        <button class="btn">5</button>
                        <button class="btn">6</button>
                        <button class="btn btn-operator">−</button>

                        <button class="btn">1</button>
                        <button class="btn">2</button>
                        <button class="btn">3</button>
                        <button class="btn btn-operator">+</button>

                        <button class="btn btn-zero">0</button>
                        <button class="btn">.</button>
                        <button class="btn btn-equals">=</button>
                    </div>
                </div>

                <!-- 單位轉換 -->
                <div id="unitPanel" class="tab-content hidden">
                    <input type="number" class="conversion-input" id="unitInput" placeholder="輸入數值">
                    <div class="conversion-grid" id="unitGrid"></div>
                </div>

                <!-- 匯率轉換 -->
                <div id="currencyPanel" class="tab-content hidden">
                    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <input type="number" class="conversion-input" id="currencyInput" placeholder="輸入新台幣(TWD)" style="margin-bottom: 0; flex: 1;">
                        <button class="refresh-btn" id="refreshBtn">🔄</button>
                    </div>
                    <div id="currencyUpdateTime" class="update-time"></div>
                    <div class="conversion-grid" id="currencyGrid"></div>
                </div>

                <!-- 公式庫 -->
                <div id="formulaPanel" class="tab-content hidden">
                    <div class="formula-search">
                        <input type="text" id="formulaSearch" placeholder="搜索公式..." data-i18n-placeholder="search_formula_placeholder">
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--primary);" data-i18n="formula_builtin">內建公式</div>
                        <div class="formula-list" id="formulaList"></div>
                    </div>

                    <div class="section-title" data-i18n="formula_custom">自建公式</div>
                    <div class="add-formula-form">
                        <div class="form-group">
                            <label data-i18n="formula_name">公式名稱</label>
                            <input type="text" id="customFormulaName" placeholder="例：圓的面積">
                        </div>
                        <div class="form-group">
                            <label data-i18n="formula_expr">公式表達式</label>
                            <input type="text" id="customFormulaExpr" placeholder="例：π*r^2">
                        </div>
                        <div class="form-group">
                            <label data-i18n="formula_category">分類</label>
                            <input type="text" id="customFormulaCategory" placeholder="例：幾何">
                        </div>
                        <div class="form-buttons">
                            <button class="btn-submit" id="addFormulaBtn" data-i18n="btn_add">新增</button>
                            <button class="btn-cancel" id="clearFormulaBtn" data-i18n="btn_clear">清空</button>
                        </div>
                    </div>
                    <div class="formula-list" id="customFormulaList" style="margin-top: 20px;"></div>
                </div>

                <!-- 儲存區 -->
                <div id="savedPanel" class="tab-content hidden">
                    <div class="saved-list" id="savedList"></div>
                </div>
            </div>

            <!-- 側邊欄 -->
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <!-- 常用按鈕 -->
                <div class="panel">
                    <h3 style="margin-bottom: 16px; font-size: 18px;" data-i18n="sidebar_common">常用按鈕</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px;">
                        <button class="btn btn-function" style="padding: 12px;">π</button>
                        <button class="btn btn-function" style="padding: 12px;">e</button>
                        <button class="btn btn-operator" style="padding: 12px;">(</button>
                        <button class="btn btn-operator" style="padding: 12px;">)</button>
                    </div>
                    <div style="background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-dark); border-radius: 12px; padding: 12px;">
                        <h4 style="font-size: 12px; margin-bottom: 8px; color: var(--text-dark-secondary);" data-i18n="sidebar_functions">支援函數</h4>
                        <div style="font-size: 11px; color: var(--text-dark-secondary); line-height: 1.6;">
                            • sin, cos, tan<br>
                            • log, ln, exp<br>
                            • sqrt (√), abs (|)<br>
                            • π, e, ^ (次方)
                        </div>
                    </div>
                </div>

                <!-- 即時匯率 -->
                <div class="panel">
                    <h3 style="margin-bottom: 12px; font-size: 16px;" data-i18n="sidebar_rate">即時匯率<br><span style="font-size: 12px; color: var(--text-dark-secondary);">(<span data-i18n="rate_unit">1 TWD</span>)</span></h3>
                    <div id="quickRate"></div>
                    <div id="quickRateTime" class="update-time" style="margin-top: 12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 公式計算 Modal -->
    <div class="modal" id="formulaModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">計算公式</div>
            <div class="modal-formula" id="modalFormula"></div>
            <div class="modal-variables" id="modalVariables"></div>
            <div class="modal-buttons">
                <button class="btn-calculate" id="calculateFormulaBtn">計算</button>
                <button class="btn-close-modal" id="closeModalBtn">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 多語系翻譯 ==========
        const i18n = {
            'zh-TW': {
                tab_calc: '計算',
                tab_unit: '單位',
                tab_currency: '匯率',
                tab_formula: '公式',
                tab_saved: '儲存',
                btn_clear: 'C',
                btn_backspace: '←',
                btn_add: '新增',
                sidebar_common: '常用按鈕',
                sidebar_functions: '支援函數',
                sidebar_rate: '即時匯率',
                rate_unit: '1 TWD',
                formula_builtin: '內建公式',
                formula_custom: '自建公式',
                formula_name: '公式名稱',
                formula_expr: '公式表達式',
                formula_category: '分類',
                search_formula_placeholder: '搜索公式（名稱、變數、類別）...',
                empty_saved: '還沒有儲存的公式',
                empty_formula: '沒有找到匹配的公式',
                update_time: '更新:',
                currency_names: {
                    'USD': '美元',
                    'JPY': '日圓',
                    'EUR': '歐元',
                    'GBP': '英鎊',
                    'AUD': '澳元',
                    'CAD': '加拿大元',
                    'CNY': '人民幣',
                    'SGD': '新加坡元',
                    'HKD': '港幣',
                    'THB': '泰銖',
                    'KRW': '韓圓'
                },
                unit_conversions: {
                    'm→ft': 'm→ft',
                    'ft→m': 'ft→m',
                    'km→mi': 'km→mi',
                    'mi→km': 'mi→km',
                    'kg→lb': 'kg→lb',
                    'lb→kg': 'lb→kg',
                    'C→F': '°C→°F',
                    'F→C': '°F→°C'
                }
            },
            'en': {
                tab_calc: 'Calc',
                tab_unit: 'Unit',
                tab_currency: 'Exchange',
                tab_formula: 'Formula',
                tab_saved: 'Saved',
                btn_clear: 'C',

        // ========== 內建公式庫（數學） ==========
        const builtInFormulas = [
            { id: 1, name: '圓的面積', expr: 'π*r^2', vars: ['r'], category: '面積' },
            { id: 2, name: '矩形面積', expr: 'l*w', vars: ['l', 'w'], category: '面積' },
            { id: 3, name: '三角形面積', expr: '0.5*b*h', vars: ['b', 'h'], category: '面積' },
            { id: 4, name: '梯形面積', expr: '0.5*(a+b)*h', vars: ['a', 'b', 'h'], category: '面積' },
            { id: 5, name: '圓的周長', expr: '2*π*r', vars: ['r'], category: '周長' },
            { id: 6, name: '矩形周長', expr: '2*(l+w)', vars: ['l', 'w'], category: '周長' },
            { id: 7, name: '球的體積', expr: '(4/3)*π*r^3', vars: ['r'], category: '體積' },
            { id: 8, name: '圓柱體積', expr: 'π*r^2*h', vars: ['r', 'h'], category: '體積' },
            { id: 9, name: '直方體體積', expr: 'l*w*h', vars: ['l', 'w', 'h'], category: '體積' },
            { id: 10, name: '圓錐體積', expr: '(1/3)*π*r^2*h', vars: ['r', 'h'], category: '體積' },
            { id: 11, name: '勾股定理', expr: 'sqrt(a^2+b^2)', vars: ['a', 'b'], category: '三角形' },
            { id: 12, name: '三角形周長', expr: 'a+b+c', vars: ['a', 'b', 'c'], category: '三角形' },
            { id: 13, name: '平均值', expr: '(x1+x2)/2', vars: ['x1', 'x2'], category: '統計' },
            { id: 14, name: '百分比', expr: '(part/whole)*100', vars: ['part', 'whole'], category: '統計' },
            { id: 15, name: '平方', expr: 'x^2', vars: ['x'], category: '代數' },
            { id: 16, name: '立方', expr: 'x^3', vars: ['x'], category: '代數' },
            { id: 17, name: '平方根', expr: 'sqrt(x)', vars: ['x'], category: '代數' },
            { id: 18, name: '立方根', expr: 'x^(1/3)', vars: ['x'], category: '代數' },
            { id: 19, name: '指數', expr: 'e^x', vars: ['x'], category: '指數對數' },
            { id: 20, name: '自然對數', expr: 'Math.log(x)', vars: ['x'], category: '指數對數' },
            { id: 21, name: '常用對數', expr: 'Math.log10(x)', vars: ['x'], category: '指數對數' },
            { id: 22, name: '一次函數', expr: 'a*x+b', vars: ['x', 'a', 'b'], category: '函數' },
            { id: 23, name: '二次函數', expr: 'a*x^2+b*x+c', vars: ['x', 'a', 'b', 'c'], category: '函數' },
            { id: 24, name: '二次方程判別式', expr: 'b^2-4*a*c', vars: ['a', 'b', 'c'], category: '函數' },
            { id: 25, name: '兩點距離', expr: 'sqrt((x2-x1)^2+(y2-y1)^2)', vars: ['x1', 'y1', 'x2', 'y2'], category: '座標' },
        ];

        // ========== 應用狀態 ==========
        let currentDisplay = '0';
        let savedFormulas = JSON.parse(localStorage.getItem('savedFormulas')) || [];
        let customFormulas = JSON.parse(localStorage.getItem('customFormulas')) || [];
        let exchangeRates = JSON.parse(localStorage.getItem('exchangeRates')) || {};
        let isDarkMode = localStorage.getItem('theme') !== 'light';
        let currentLanguage = localStorage.getItem('language') || 'zh-TW';

        const currencyList = {
            'USD': '美元',
            'JPY': '日圓',
            'EUR': '歐元',
            'GBP': '英鎊',
            'AUD': '澳元',
            'CAD': '加拿大元',
            'CNY': '人民幣',
            'SGD': '新加坡元',
            'HKD': '港幣',
            'THB': '泰銖',
            'KRW': '韓圓'
        };

        // ========== DOM 元素 ==========
        const display = document.getElementById('display');
        const displayFormula = document.getElementById('displayFormula');
        const themeBtn = document.getElementById('themeBtn');
        const langSelector = document.getElementById('langSelector');
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');
        const formulaSearch = document.getElementById('formulaSearch');
        const formulaList = document.getElementById('formulaList');
        const customFormulaList = document.getElementById('customFormulaList');
        const addFormulaBtn = document.getElementById('addFormulaBtn');
        const clearFormulaBtn = document.getElementById('clearFormulaBtn');
        const customFormulaName = document.getElementById('customFormulaName');
        const customFormulaExpr = document.getElementById('customFormulaExpr');
        const customFormulaCategory = document.getElementById('customFormulaCategory');
        const formulaModal = document.getElementById('formulaModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const calculateFormulaBtn = document.getElementById('calculateFormulaBtn');
        const currencyInput = document.getElementById('currencyInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const savedList = document.getElementById('savedList');
        const savedCount = document.getElementById('savedCount');

        // ========== 初始化 ==========
        function init() {
            updateDisplay();
            updateTheme();
            langSelector.value = currentLanguage;
            updateLanguage(currentLanguage);
            renderFormulas();
            renderCustomFormulas();
            fetchExchangeRates();
            attachEventListeners();
        }

        // ========== 多語系管理 ==========
        function t(key, fallback = '') {
            const keys = key.split('.');
            let value = i18n[currentLanguage];
            for (let k of keys) {
                value = value?.[k];
            }
            return value || fallback || key;
        }

        function updateLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('language', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                el.textContent = t(key, el.textContent);
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.dataset.i18nPlaceholder;
                el.placeholder = t(key, el.placeholder);
            });
        }

        langSelector.addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        // ========== 主題切換 ==========
        function updateTheme() {
            if (isDarkMode) {
                document.body.classList.remove('light');
                themeBtn.textContent = '☀️';
            } else {
                document.body.classList.add('light');
                themeBtn.textContent = '🌙';
            }
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            updateTheme();
        });

        // ========== 計算邏輯 ==========
        function updateDisplay() {
            display.textContent = currentDisplay;
        }

        function calculate(expr) {
            try {
                const processed = expr
                    .replace(/π/g, Math.PI)
                    .replace(/e/g, Math.E)
                    .replace(/√/g, 'Math.sqrt')
                    .replace(/\^/g, '**')
                    .replace(/÷/g, '/')
                    .replace(/×/g, '*')
                    .replace(/−/g, '-')
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/log10\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/exp\(/g, 'Math.exp(')
                    .replace(/\|/g, 'Math.abs(')
                    .replace(/Math\.log\(/g, 'Math.log(');
                
                const result = eval(processed);
                return typeof result === 'number' ? parseFloat(result.toFixed(12)) : 'Error';
            } catch (e) {
                return 'Error';
            }
        }

        // ========== 按鈕事件 ==========
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = btn.textContent.trim();

                if (text === '=') {
                    const result = calculate(currentDisplay);
                    if (result !== 'Error') {
                        savedFormulas.unshift({ id: Date.now(), formula: currentDisplay, result });
                        if (savedFormulas.length > 10) savedFormulas.pop();
                        localStorage.setItem('savedFormulas', JSON.stringify(savedFormulas));
                        currentDisplay = result.toString();
                        displayFormula.textContent = '';
                        updateDisplay();
                        renderSaved();
                    } else {
                        currentDisplay = 'Error';
                        updateDisplay();
                    }
                } else if (text === 'C' || text === t('btn_clear')) {
                    currentDisplay = '0';
                    displayFormula.textContent = '';
                    updateDisplay();
                } else if (text === '←' || text === t('btn_backspace')) {
                    currentDisplay = currentDisplay.slice(0, -1) || '0';
                    updateDisplay();
                } else if (currentDisplay === '0' && text !== '.' && text !== '(') {
                    currentDisplay = text;
                    updateDisplay();
                } else {
                    currentDisplay += text;
                    updateDisplay();
                }
            });
        });

        // ========== 標籤切換 ==========
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(c => c.classList.add('hidden'));
                
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById(tabName + 'Panel').classList.remove('hidden');

                if (tabName === 'formula') {
                    renderFormulas();
                    renderCustomFormulas();
                } else if (tabName === 'saved') {
                    renderSaved();
                }
            });
        });

        // ========== 公式庫搜索 ==========
        function renderFormulas() {
            const query = formulaSearch.value.toLowerCase();
            const filtered = builtInFormulas.filter(f => 
                f.name.toLowerCase().includes(query) ||
                f.category.toLowerCase().includes(query) ||
                f.vars.some(v => v.toLowerCase().includes(query)) ||
                f.expr.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                formulaList.innerHTML = `<div class="empty-state">${t('empty_formula')}</div>`;
                return;
            }

            formulaList.innerHTML = filtered.map(f => `
                <div class="formula-item" onclick="selectFormula(${f.id}, '${f.name}', '${f.expr}', ${JSON.stringify(f.vars).replace(/"/g, '&quot;')})">
                    <div class="formula-name">${f.name}</div>
                    <div class="formula-expr">${f.expr}</div>
                    <div class="formula-category">${f.category}</div>
                </div>
            `).join('');
        }

        formulaSearch.addEventListener('input', () => {
            renderFormulas();
            renderCustomFormulas();
        });

        // ========== 自建公式 ==========
        function renderCustomFormulas() {
            const query = formulaSearch.value.toLowerCase();
            
            const filtered = customFormulas.filter(f => 
                f.name.toLowerCase().includes(query) ||
                f.category.toLowerCase().includes(query) ||
                f.expr.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                customFormulaList.innerHTML = '';
                return;
            }

            customFormulaList.innerHTML = `
                <div class="section-title">${t('formula_custom')}（搜尋結果）</div>
                ${filtered.map(f => `
                    <div class="formula-item formula-item-custom">
                        <div class="formula-item-content" onclick="selectFormula(${f.id}, '${f.name}', '${f.expr}', ${JSON.stringify(f.vars).replace(/"/g, '&quot;')})">
                            <div class="formula-name">${f.name}</div>
                            <div class="formula-expr">${f.expr}</div>
                            <div class="formula-category">${f.category}</div>
                        </div>
                        <button class="delete-formula-btn" onclick="deleteCustomFormula(${f.id})">✕</button>
                    </div>
                `).join('')}
            `;
        }

        addFormulaBtn.addEventListener('click', () => {
            const name = customFormulaName.value.trim();
            const expr = customFormulaExpr.value.trim();
            const category = customFormulaCategory.value.trim() || '自訂';

            if (!name || !expr) {
                alert('請輸入公式名稱和表達式');
                return;
            }

            const varPattern = /[a-zA-Z_]\w*/g;
            const vars = [...new Set(expr.match(varPattern) || [])];

            const newFormula = {
                id: Date.now(),
                name,
                expr,
                category,
                vars
            };

            customFormulas.push(newFormula);
            localStorage.setItem('customFormulas', JSON.stringify(customFormulas));

            customFormulaName.value = '';
            customFormulaExpr.value = '';
            customFormulaCategory.value = '';

            renderFormulas();
            renderCustomFormulas();
        });

        clearFormulaBtn.addEventListener('click', () => {
            customFormulaName.value = '';
            customFormulaExpr.value = '';
            customFormulaCategory.value = '';
        });

        window.deleteCustomFormula = (id) => {
            customFormulas = customFormulas.filter(f => f.id !== id);
            localStorage.setItem('customFormulas', JSON.stringify(customFormulas));
            renderFormulas();
            renderCustomFormulas();
        };

        // ========== 選擇公式並打開 Modal ==========
        window.selectFormula = (id, name, expr, vars) => {
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalFormula').textContent = `公式: ${expr}`;

            const modalVars = document.getElementById('modalVariables');
            modalVars.innerHTML = vars.map(v => `
                <div class="variable-input">
                    <label>${v}</label>
                    <input type="number" id="var_${v}" placeholder="輸入 ${v} 的值" step="any">
                </div>
            `).join('');

            window.currentFormulaExpr = expr;
            window.currentFormulaVars = vars;
            window.currentFormulaName = name;

            formulaModal.classList.add('active');
        };

        closeModalBtn.addEventListener('click', () => {
            formulaModal.classList.remove('active');
        });

        calculateFormulaBtn.addEventListener('click', () => {
            const vars = window.currentFormulaVars;
            let expr = window.currentFormulaExpr;

            for (let v of vars) {
                const value = document.getElementById(`var_${v}`).value;
                if (value === '') {
                    alert(`請輸入 ${v} 的值`);
                    return;
                }
                expr = expr.replace(new RegExp(`\\b${v}\\b`, 'g'), `(${value})`);
            }

            const result = calculate(expr);
            if (result !== 'Error') {
                currentDisplay = result.toString();
                displayFormula.textContent = `${window.currentFormulaName}`;
                updateDisplay();
                
                savedFormulas.unshift({ id: Date.now(), formula: `${window.currentFormulaName}`, result });
                if (savedFormulas.length > 10) savedFormulas.pop();
                localStorage.setItem('savedFormulas', JSON.stringify(savedFormulas));
                renderSaved();
            }

            formulaModal.classList.remove('active');
        });

        // ========== 匯率 ==========
        async function fetchExchangeRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await response.json();
                
                if (data.rates) {
                    Object.keys(currencyList).forEach(currency => {
                        exchangeRates[currency] = data.rates[currency] || 0;
                    });
                    localStorage.setItem('exchangeRates', JSON.stringify(exchangeRates));
                }
            } catch (e) {
                console.log('匯率更新失敗');
            }
        }

        refreshBtn.addEventListener('click', fetchExchangeRates);

        // ========== 儲存管理 ==========
        function renderSaved() {
            savedCount.textContent = savedFormulas.length;
            if (savedFormulas.length === 0) {
                savedList.innerHTML = '<div class="empty-state">' + t('empty_saved') + '</div>';
                return;
            }
            savedList.innerHTML = savedFormulas.map(f => `
                <div class="saved-item">
                    <div>
                        <div class="saved-formula">${f.formula}</div>
                        <div class="saved-result">= ${f.result}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteSaved(${f.id})">✕</button>
                </div>
            `).join('');
        }

        window.deleteSaved = (id) => {
            savedFormulas = savedFormulas.filter(f => f.id !== id);
            localStorage.setItem('savedFormulas', JSON.stringify(savedFormulas));
            renderSaved();
        };

        // ========== 初始化 ==========
        function attachEventListeners() {
            renderSaved();
        }

        init();
    </script>
